services:
  - type: web
    name: codebattle
    runtime: node
    plan: free
    buildCommand: yarn build
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
